<div class="login-container">
  <div class="login-card">
    <h2>PDF Processor</h2>
    <p>Log in to convert your files.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="email">E-mail</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="seu@email.com"
        >
        <div class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Invalid E-mail.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="******"
        >
        <div class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          The password must be at least 6 characters long.
        </div>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Entering...' : 'Login' }}
      </button>

    </form>
  </div>
</div>
