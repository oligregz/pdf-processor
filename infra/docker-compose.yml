services:
  api-gateway:
    build: 
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - MONGO_HOST=mongodb
      - RABBITMQ_HOST=rabbitmq
      - NEST_POSTGRES_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      - MONGO_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:${MONGO_PORT}/${MONGO_DB}?authSource=${MONGO_AUTH_SOURCE}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:${RABBITMQ_PORT}
    networks:
      - pdf_network
    depends_on:
      - postgres
      - mongodb
      - rabbitmq

  pdf-worker:
    build: 
      context: ../pdf-worker
      dockerfile: Dockerfile
    container_name: pdf-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=postgres
      - MONGO_HOST=mongodb
      - RABBITMQ_HOST=rabbitmq
    networks:
      - pdf_network
    depends_on:
      - postgres
      - mongodb
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    networks:
      - pdf_network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - pdf_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql

  mongodb:
    image: mongo:6-jammy
    container_name: mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    networks:
      - pdf_network
    volumes:
      - mongodb_data:/data/db
      - ../init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js

networks:
  pdf_network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  rabbitmq_data: